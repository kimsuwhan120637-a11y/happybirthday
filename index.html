<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>벚꽃 소녀의 편지함</title>
    <style>
        body { margin: 0; background: #fff5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Apple SD Gothic Neo', sans-serif; overflow: hidden; }
        
        .mailbox-container { position: relative; width: 100%; max-width: 500px; height: 80vh; display: flex; justify-content: center; align-items: center; }
        .mailbox-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        /* ✉️ 클릭 영역: 가장 위로 올려서 무조건 클릭되게 함 */
        .click-area { 
            position: absolute; top: 31%; left: 28%; width: 130px; height: 90px; 
            cursor: pointer; z-index: 100; /* 숫자를 높여서 편지보다 위에 두었습니다 */
            /* background: rgba(255,0,0,0.2); // 위치 확인용 */
        }

        .letter {
            position: absolute; top: 35%; left: 28%; width: 180px; height: 250px;
            background: white; padding: 25px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(214, 51, 108, 0.2);
            border: 2px solid #ffdeeb; border-radius: 15px;
            transition: all 0.5s ease-in-out;
            opacity: 0; visibility: hidden; 
            transform: translate(-10%, -20%) scale(0.5);
            pointer-events: none; /* 👈 편지가 클릭을 방해하지 못하게 설정 */
        }

        .letter.active { 
            opacity: 1; visibility: visible; 
            transform: translate(-10%, -40%) scale(1.6); 
            z-index: 50; 
        }

        .letter h3 { font-size: 15px; margin: 0 0 10px 0; color: #d6336c; border-bottom: 1px solid #ffdeeb; padding-bottom: 5px; }
        .letter p { font-size: 12px; line-height: 1.6; color: #444; word-break: keep-all; }
        .page-num { font-size: 10px; color: #aaa; position: absolute; bottom: 10px; right: 15px; }

        .cherry-blossom { position: absolute; background: #ffb7c5; border-radius: 50%; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div class="mailbox-container">
        <img src="image_10.png.png" class="mailbox-img" alt="벚꽃 소녀">
        
        <div class="click-area" onclick="nextLetter()"></div>

        <div class="letter" id="letter0">
            <h3>From. 철수 🌸</h3>
            <p>생일 축하해! 첫 번째 편지야.</p>
            <div class="page-num">1 / 3</div>
        </div>

        <div class="letter" id="letter1">
            <h3>From. 영희 🎀</h3>
            <p>두 번째 편지야! 우리 더 친하게 지내자.</p>
            <div class="page-num">2 / 3</div>
        </div>

        <div class="letter" id="letter2">
            <h3>From. 민수 🎂</h3>
            <p>마지막 편지! 세상에서 제일 행복한 하루 보내!</p>
            <div class="page-num">3 / 3</div>
        </div>
    </div>

    <script>
        let currentIdx = -1;
        const totalLetters = 3;

        function nextLetter() {
            // 1. 모든 편지에서 active 클래스 제거
            for(let i=0; i<totalLetters; i++) {
                document.getElementById('letter' + i).classList.remove('active');
            }

            // 2. 다음 번호 계산
            currentIdx = (currentIdx + 1) % totalLetters;

            // 3. 해당 번호 편지만 활성화
            const activeLetter = document.getElementById('letter' + currentIdx);
            activeLetter.classList.add('active');

            // 4. 벚꽃 효과
            createPetals();
        }

        function createPetals() {
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.classList.add('cherry-blossom');
                const size = Math.random() * 7 + 5 + 'px';
                p.style.width = size; p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 2 + 3 + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }
        }
    </script>
</body>
</html>
